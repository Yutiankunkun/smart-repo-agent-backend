<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>

        @page {
            size: A4;
            margin: 2cm;
        }

        body {
            font-family: "Hiragino Sans", "Microsoft YaHei", sans-serif;
            font-size: 11pt;
            color: #333;
            line-height: 1.6;
        }

        .header {
            text-align: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 18pt;
            color: #2c3e50;
            margin: 0;
        }

        .header .subtitle {
            font-size: 10pt;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .student-info {
            background-color: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 12px 16px;
            margin-bottom: 20px;
        }

        .student-info table {
            width: 100%;
            border-collapse: collapse;
        }

        .student-info td {
            padding: 4px 8px;
            font-size: 10pt;
        }

        .student-info .label {
            font-weight: bold;
            width: 100px;
            color: #2c3e50;
        }

        .section {
            margin-bottom: 16px;
        }

        .section h2 {
            font-size: 13pt;
            color: #2c3e50;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        .section .content {
            padding-left: 8px;
            font-size: 10.5pt;
        }

        .footer {
            margin-top: 30px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-size: 9pt;
            color: #999;
            text-align: right;
        }
    </style>

</head>
<body>

<div class="header">
    <h1>レポート</h1>
    <div class="subtitle">{{ teacher_specialty }}</div>
</div>

<div class="student-info">
    <table>
        <tr>
            <td class="label">学生番号</td>
            <td>{{ student_id }}</td>
            <td class="label">氏名</td>
            <td>{{ student_name }}</td>
        </tr>
        <tr>
            <td class="label">英語</td>
            <td>{{ toeic }}</td>
            <td class="label">日本語</td>
            <td>{{ jlpt }}</td>
        </tr>
        <tr>
            <td class="label">面談日</td>
            <td>{{ meeting_date }}</td>
            <td class="label">担任</td>
            <td>{{ teacher_name }}</td>
        </tr>
    </table>
</div>

<div class="section">
    <h2>面談内容まとめ</h2>

    <div class="content">
        <div class="item">
            <strong>出来事</strong><br>
            {{ events }}
        </div>

        <div class="item">
            <strong>面談プロセス</strong><br>
            {{ process }}
        </div>

        <div class="item">
            <strong>指導・提案</strong><br>
            {{ suggestions }}
        </div>

        <div class="item">
            <strong>メンタル状況</strong><br>
            {{ mental }}
        </div>
    </div>
</div>

<div class="section">
    <h2>担任原稿メモ</h2>
    <div class="content">
        {{ raw_memo }}
    </div>
</div>


<div class="footer">
    {{ teacher_id }}
</div>
</body>

</html>
